name: Run Tests on Pull Request
on:
  pull_request:
    types: 
      - opened
      - synchronize
      - reopened

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          
      - name: Run tests
        env:
          API_KEY: ${{ secrets.PROD_API_KEY }}
        run: |
          chmod +x run_tests.sh
          chmod +x 123.sh
          bash ./run_tests.sh
          bash ./123.sh
